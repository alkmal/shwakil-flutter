<html>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="شواكل لإدارة البطاقات والنسخ الاحتياطي.">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#0F766E">
  <meta name="format-detection" content="telephone=no">
  <meta property="og:site_name" content="شواكل">
  <meta property="og:type" content="website">
  <meta property="og:title" content="شواكل">
  <meta property="og:description" content="شواكل محفظة إلكترونية وبطاقات.">
  <meta property="og:image" content="/logo.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="شواكل">
  <meta name="twitter:description" content="شواكل محفظة إلكترونية وبطاقات.">
  <meta name="twitter:image" content="/logo.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="شواكل">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png?v=2"/>

  <title>شواكل</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,body{margin:0;min-height:100%;background:#f7f9fa}
    #app-loader{position:fixed;inset:0;display:grid;place-items:center;font-family:Arial,sans-serif;color:#0f766e;background:#f7f9fa;z-index:0}
    #app-loader div{display:grid;gap:14px;justify-items:center;font-weight:700}
    #app-loader span{width:38px;height:38px;border:4px solid #d9eeeb;border-top-color:#0f766e;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="app-loader"><div><span></span><b>جاري تحميل شواكل...</b></div></div>
  <script>
    if ('serviceWorker' in navigator) {
      const reloadKey = 'shwakil-sw-reloaded-21';
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (sessionStorage.getItem(reloadKey) === '1') return;
        sessionStorage.setItem(reloadKey, '1');
        window.location.reload();
      });
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.update());
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
